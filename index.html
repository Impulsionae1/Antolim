<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>Antolim — WhatsApp Hub</title>
  <meta name="description" content="Plataforma modular para vender mais pelo WhatsApp. Envios, Agente IA, Formulários e Campanhas.">

  <!-- Open Graph -->
  <meta property="og:title" content="Antolim — WhatsApp Hub">
  <meta property="og:description" content="Contrate só o módulo que você precisa. Venda mais pelo WhatsApp.">
  <meta property="og:type" content="website">

  <!-- Favicon corrigido -->

  <!-- CSS básico -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
    }

    .cta {
      margin-top: 30px;
    }

    .btn {
      background: #22c55e;
      color: #000;
      padding: 15px 25px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
    }

    .btn:hover {

    }

</head>

<body>

    <div class="cta">
      <a 
        href="https://wa.me/5511999999999" 
        class="btn"
        target="_blank"
      >
        Falar no WhatsApp
      </a>
    </div>
  </main>

  <!-- JS básico (evita bugs futuros) -->
  <script>
    console.log("Antolim landing carregada");

    // exemplo: rastrear clique no botão
    const btn = document.querySelector('.btn');
    if (btn) {
      btn.addEventListener('click', () => {
        console.log('Clique no WhatsApp');
      });
    }
  </script>

</body>
